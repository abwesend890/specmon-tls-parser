// protos/tls13parser.proto
syntax = "proto3";

// The package name is used by the generated Go code.
package Tls13Parser;
option go_package = "./Tls13Parser";


// ---------------------------------------
// --------- BEGIN Utils section
// ---------------------------------------

service Utils {
  rpc Split (SplitRequest) returns (SplitResponse) {}
}

message SplitRequest {
  string data = 1;
  uint32 pos = 2;
}

message SplitResponse {
  string part1 = 1;
  string part2 = 2;
}

// ---------------------------------------
// --------- END Utils section
// ---------------------------------------


// ---------------------------------------
// --------- BEGIN TLS13 section
// ---------------------------------------

service TlsParser {
  rpc Parse (ParseRequest) returns (ParseResponse) {}
//  HelloRetryRequest = ServerHello with special random value
//  https://datatracker.ietf.org/doc/html/rfc8446#section-4.1.3
  rpc ParseHelloRetryRequest (ParseRequest) returns (ParseResponse) {}
}

message ParseRequest {
  bytes data = 1;
}

message ParseResponse {
  repeated ParseResponseMessage messages = 1;
}

message ParseResponseMessage {
  oneof payload {
    NewSessionTicket new_session_ticket = 1;
    ClientHello client_hello = 2;
    ChangeCipherSpec change_cipher_spec = 3;
    ApplicationData application_data = 4;
    ServerHello server_hello = 5;
    HelloRetryRequest hello_retry_request = 6;
    Raw raw = 7;
  }
//  bytes message_header = 8;
  bytes transcript = 8;
}


message Raw {
  bytes load = 1;
}


message ApplicationData {
  bytes application_data = 1;
}

message ChangeCipherSpec {
  bytes change_cipher_spec = 1;
}

message ClientHello {
  bytes legacy_version = 1;
  bytes random = 2;
  bytes legacy_session_id = 3;
  bytes cipher_suites = 4;
  bytes legacy_compression_methods = 5;
  bytes extensions = 6;
}

message ServerHello {
  bytes legacy_version = 1;
  bytes random = 2;
  bytes legacy_session_id_echo = 3;
  bytes cipher_suites = 4;
  bytes legacy_compression_methods = 5;
  bytes extensions = 6;
}

// same as ServerHello but with fixed random value, still we return it as parsed for validation in SpecMon
message HelloRetryRequest {
  bytes legacy_version = 1;
  bytes random = 2;
  bytes legacy_session_id_echo = 3;
  bytes cipher_suites = 4;
  bytes legacy_compression_methods = 5;
  bytes extensions = 6;
}

message NewSessionTicket {
  bytes ticket_lifetime = 1;
  bytes ticket_age_add = 2;
  bytes ticket_nonce = 3;
  bytes ticket = 4;
  bytes extensions = 5;
}

// ---------------------------------------
// --------- END TLS13 section
// ---------------------------------------